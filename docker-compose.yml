services:
  fastapi:
    build: ./backend
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - clickhouse
      - minio
      - kafka
      - trino
      - superset
    volumes:
      - ./data:/app/data
      - "./12-korxona shakli_Iyun_1700_все.csv:/app/data/estat_12_korxona.csv:ro"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dwh
      POSTGRES_PASSWORD: dwh
      POSTGRES_DB: dwh
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/postgres:/docker-entrypoint-initdb.d:ro

  clickhouse:
    image: clickhouse/clickhouse-server:25.3
    ports:
      - "8123:8123"
      - "9009:9000"
    environment:
      CLICKHOUSE_DB: dwh
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./sql/clickhouse:/docker-entrypoint-initdb.d:ro

  trino:
    image: trinodb/trino:482
    depends_on:
      - clickhouse
    ports:
      - "8089:8080"
    volumes:
      - ./trino/catalog:/etc/trino/catalog:ro

  superset:
    build: ./superset
    depends_on:
      - clickhouse
    environment:
      SUPERSET_SECRET_KEY: dwh-demo-superset-secret-key-change-in-production
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      SUPERSET_LOAD_EXAMPLES: "no"
      SUPERSET_ADMIN_USERNAME: admin
      SUPERSET_ADMIN_PASSWORD: admin
    ports:
      - "8087:8088"
    volumes:
      - superset_home:/app/superset_home
    command: >
      /bin/sh -c "superset db upgrade &&
      (superset fab create-admin --username admin --password admin
      --firstname DWH --lastname Admin --email admin@example.com || true) &&
      superset init &&
      /app/.venv/bin/python /app/pythonpath/bootstrap_public.py &&
      superset run -h 0.0.0.0 -p 8088 --with-threads"

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-25-50Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/landing-zone &&
      mc mb --ignore-existing local/raw-zone &&
      mc mb --ignore-existing local/curated-zone
      "

  kafka:
    image: apache/kafka:3.7.0
    hostname: kafka
    ports:
      - "9092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://:9092,EXTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
  nifi:
    image: apache/nifi:1.27.0
    ports:
      - "8080:8080"
    environment:
      NIFI_WEB_HTTP_PORT: 8080
    volumes:
      - nifi_data:/opt/nifi/nifi-current

  airflow:
    image: apache/airflow:2.10.4-python3.11
    depends_on:
      - fastapi
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://dwh:dwh@postgres:5432/dwh
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      DWH_API_URL: http://fastapi:8000
    ports:
      - "8088:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
    command: >
      bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true && airflow standalone"

  prometheus:
    image: prom/prometheus:v2.55.1
    ports:
      - "9095:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro

volumes:
  postgres_data:
  clickhouse_data:
  minio_data:
  kafka_data:
  nifi_data:
  superset_home:



